      \n```python\nget_table_stats_and_schema(\n    catalog=\"ac_demo\",\n    schema=\"\
      dc_assistant\",\n    table=\"customers\",\n    table_stat_level=\"SIMPLE\"\n)\n```\n\n\
      This will show you the table's columns, data types, and statistics to help you\
      \ understand the data before creating a Genie Space."
    execution_success: true
  expectations:
    expected_facts:
    - get_table_stats_and_schema
    - ac_demo
    - customers
    expected_patterns:
    - pattern: get_table_stats_and_schema
      min_count: 1
      description: Must call or reference the get_table_stats_and_schema MCP tool
    guidelines:
    - The agent should call get_table_stats_and_schema to inspect the table schema
    - The agent should pass the correct catalog, schema, and table name
    assertions:
    - The response invokes get_table_stats_and_schema for ac_demo.dc_assistant.customers
    trace_expectations:
      required_tools:
      - mcp__databricks__get_table_stats_and_schema
  metadata:
    category: happy_path
    source: interactive
    created_at: '2026-02-11T13:44:22.683085'

