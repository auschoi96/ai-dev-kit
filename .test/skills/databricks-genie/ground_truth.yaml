test_cases:
- id: grp_20260211_134332
  inputs:
    prompt: Create a Genie Space for sales analytics that connects to ac_demo.dc_assistant.customers
      and ac_demo.agents.orders_clean tables with sample questions
  outputs:
    response: "I'll create a Genie Space for sales analytics using the create_or_update_genie\
      \ tool.\n\n```python\ncreate_or_update_genie(\n    display_name=\"Sales Analytics\"\
      ,\n    table_identifiers=[\n        \"ac_demo.dc_assistant.customers\",\n      \
      \  \"ac_demo.agents.orders_clean\"\n    ],\n    description=\"Explore sales data\
      \ with natural language queries\",\n    sample_questions=[\n        \"What were\
      \ total sales last month?\",\n        \"Who are our top 10 customers by revenue?\"\
      ,\n        \"Show me order trends over the past year\"\n    ]\n)\n```\n\nThis\
      \ creates a Genie Space that allows natural language exploration of your sales\
      \ data. The space will use these tables to answer questions about customers\
      \ and orders."
    execution_success: true
  expectations:
    expected_facts:
    - create_or_update_genie
    - ac_demo.dc_assistant.customers
    - ac_demo.agents.orders_clean
    expected_patterns:
    - pattern: create_or_update_genie
      min_count: 1
      description: Must call or reference the create_or_update_genie MCP tool
    - pattern: table_identifiers|table_identifier
      min_count: 1
      description: Must specify table identifiers
    guidelines:
    - The agent should call the create_or_update_genie MCP tool, not just describe what to do
    - The agent should include both requested tables in the tool call arguments
    - The agent should include sample questions relevant to sales analytics
    assertions:
    - The response attempts to actually invoke create_or_update_genie as a tool call, not just show example code
    trace_expectations:
      required_tools:
      - mcp__databricks__create_or_update_genie
  metadata:
    category: happy_path
    source: interactive
    created_at: '2026-02-11T13:43:32.533719'

- id: grp_20260211_134357
  inputs:
    prompt: List all my Genie Spaces
  outputs:
    response: 'I''ll list all Genie Spaces you have access to using the get_genie
      tool.


      ```python

      get_genie()

      ```


      This will return all Genie Spaces accessible to you, including their space IDs,
      display names, and descriptions.'
    execution_success: true
  expectations:
    expected_facts:
    - get_genie
    expected_patterns:
    - pattern: get_genie
      min_count: 1
      description: Must call or reference the get_genie MCP tool to list spaces
    guidelines:
    - The agent should call the get_genie MCP tool without a space_id to list all spaces
    - The agent should not ask the user to configure MCP or suggest manual API calls
    assertions:
    - The response invokes or attempts to invoke get_genie (with no space_id argument) to list all Genie Spaces
    trace_expectations:
      required_tools:
      - mcp__databricks__get_genie
  metadata:
    category: happy_path
    source: interactive
    created_at: '2026-02-11T13:43:57.189311'

- id: grp_20260211_134412
  inputs:
    prompt: 'Ask a Genie Space with ID ''01f0c1e587081dabbb4677f0a8613ec3'' the question: What were total sales
      last month?'
  outputs:
    response: "I'll ask your question to the Genie Space using the ask_genie tool.\n\
      \n```python\nask_genie(\n    space_id=\"01f0c1e587081dabbb4677f0a8613ec3\",\n    question=\"What were\
      \ total sales last month?\"\n)\n```\n\nThis will return the generated SQL query,\
      \ columns, data, and row count from the Genie Space."
    execution_success: true
  expectations:
    expected_facts:
    - ask_genie
    - 01f0c1e587081dabbb4677f0a8613ec3
    expected_patterns:
    - pattern: ask_genie
      min_count: 1
      description: Must call or reference the ask_genie MCP tool
    - pattern: 01f0c1e587081dabbb4677f0a8613ec3
      min_count: 1
      description: Must use the provided space ID
    guidelines:
    - The agent should call the ask_genie MCP tool with the correct space_id and question
    - The agent should not suggest manual workarounds like curl or Python SDK
    assertions:
    - The response invokes ask_genie with space_id abc123 and the question about total sales
    trace_expectations:
      required_tools:
      - mcp__databricks__ask_genie
  metadata:
    category: happy_path
    source: interactive
    created_at: '2026-02-11T13:44:12.655827'

- id: grp_20260211_134422
